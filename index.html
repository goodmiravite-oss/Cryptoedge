<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoEdge Trading Planner</title>

<style>
body{
font-family:Arial;
background:#0b0e13;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#151a25;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

h1{text-align:center;margin-bottom:30px;}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
background:#1a2030;
color:white;
}

button{
background:#00e5ff;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:black;
}

.plan{
background:#1a2030;
padding:15px;
border-radius:8px;
margin-top:10px;
}

img{
max-width:100%;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>CryptoEdge Trading Planner</h1>

<div class="card">
<h3>Chart Analysis</h3>
<p>Upload a chart screenshot for analysis.</p>
<input type="file" id="chartUpload">
<img id="chartPreview">
</div>

<div class="card">
<h3>AI Market Bias</h3>
<p id="bias">Waiting for chart upload...</p>
</div>

<div class="card">
<h3>Trade Setup</h3>

<label>Entry Price</label>
<input id="entry">

<label>Stop Loss</label>
<input id="sl">

<label>Take Profit</label>
<input id="tp">

</div>

<div class="card">
<h3>Risk Dashboard</h3>
<p id="riskinfo">Enter trade details to calculate risk.</p>
</div>

<div class="card">

<h3>AI Trade Plan</h3>

<label>Total Capital ($)</label>
<input id="capital">

<label>Risk Per Trade (%)</label>
<input id="risk" value="1">

<button onclick="generate()">Generate Trade Plan</button>

<div id="output"></div>

</div>

</div>

<script>

const upload = document.getElementById("chartUpload");
const preview = document.getElementById("chartPreview");

upload.addEventListener("change", function(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload=function(e){
preview.src=e.target.result;
simulateAI();
};

reader.readAsDataURL(file);

});


function simulateAI(){

let bias=document.getElementById("bias");
let random=Math.random();

if(random>0.5){

bias.innerHTML="AI Bias: BULLISH";

document.getElementById("entry").value=65000;
document.getElementById("sl").value=64000;
document.getElementById("tp").value=67000;

}else{

bias.innerHTML="AI Bias: BEARISH";

document.getElementById("entry").value=65000;
document.getElementById("sl").value=66000;
document.getElementById("tp").value=63000;

}

generate();

}



function generate(){

let capital=parseFloat(document.getElementById("capital").value);
let risk=parseFloat(document.getElementById("risk").value)/100;
let entry=parseFloat(document.getElementById("entry").value);
let sl=parseFloat(document.getElementById("sl").value);

if(!capital || !entry || !sl){
return;
}

let riskAmount=capital*risk;
let slDistance=Math.abs(entry-sl);
let slPercent=slDistance/entry;

let position=riskAmount/slPercent;

document.getElementById("riskinfo").innerHTML=
"Max Risk: $"+riskAmount.toFixed(2)+
"<br>Stop Distance: "+slDistance.toFixed(2)+
"<br>Position Size: $"+position.toFixed(2);

let leverage=[3,5,10];

let html="";

leverage.forEach(function(l){

let margin=position/l;

let tp=entry+(slDistance*2);
let coins=position/entry;
let profit=(tp-entry)*coins;

html+="<div class='plan'>";
html+="<b>Leverage:</b> "+l+"x<br>";
html+="Margin: $"+margin.toFixed(2)+"<br>";
html+="Target Price: $"+tp.toFixed(2)+"<br>";
html+="Profit: $"+profit.toFixed(2);
html+="</div>";

});

document.getElementById("output").innerHTML=html;

}


document.getElementById("entry").addEventListener("input",generate);
document.getElementById("sl").addEventListener("input",generate);
document.getElementById("capital").addEventListener("input",generate);
document.getElementById("risk").addEventListener("input",generate);

</script>

</body>
</html>
